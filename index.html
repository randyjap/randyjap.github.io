<!doctype html>
<html lang="en" class="disable-dbl-tap-zoom">
<head>
  <meta charset="utf-8">
  <title>Demo</title>
  <meta name="description" content="Signature Pad - HTML5 canvas based smooth signature drawing using variable width spline interpolation.">

  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <link rel="stylesheet" href="css/signature-pad.css">

  <!--[if IE]>
    <link rel="stylesheet" type="text/css" href="css/ie9.css">
  <![endif]-->

</head>
<body onselectstart="return false">
  <div>
    <div id="signature-pad--header" class="signature-pad--header" style="width: 100%; position: fixed; top: 0; z-index: 9999; background-color: white;">

      <div class="signature-pad--actions">
        <div>
          <button type="button" class="button" data-action="clear">Clear</button>
          <button type="button" class="button" data-action="change-color">Change color</button>
          <button type="button" class="button" data-action="undo">Undo</button>
          <button type="button" class="button" data-action="toggle-answer">Toggle Answer</button>
          <button type="button" class="button">Report problem</button>
          <button type="button" class="button">Mark "Got it right"</button>
          <button type="button" class="button">Mark "Got it wrong"</button>
        </div>
      </div>

    </div>
  </div>
  <div id="signature-pad" class="signature-pad">
    <div class="signature-pad--body">
      <img id="question" src="1.jpg" style="max-width: 100%; max-height: 100%;"/>
      <img id="answer" src="2.jpg" style="display: none; max-width: 100%; max-height: 100%;"/>
      <canvas id="canvas" style="max-width: 100%; max-height: 100%;"></canvas>
    </div>
  </div>

  <script src="js/signature_pad.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
